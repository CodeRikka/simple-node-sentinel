<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple Node Sentinel</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header>
      <div>
        <h1>Simple Node Sentinel</h1>
        <p>Read-only node status</p>
      </div>
      <div id="connection" class="status">Connecting…</div>
    </header>
    <main>
      <section>
        <h2>System</h2>
        <div id="system-summary" class="cards"></div>
      </section>
      <section>
        <h2>GPUs</h2>
        <div id="gpus" class="cards"></div>
      </section>
      <section>
        <h2>GPU processes</h2>
        <div class="table-wrap">
          <table id="gpu-processes">
            <thead><tr><th>GPU</th><th>User</th><th>PID</th><th>GPU memory</th><th>CPU</th><th>RAM</th><th>Runtime</th><th>Command</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
      <section>
        <h2>Users</h2>
        <div class="table-wrap">
          <table id="users">
            <thead><tr><th>User</th><th>Processes</th><th>CPU</th><th>RAM</th><th>GPU processes</th><th>GPU memory</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
      <section>
        <h2>Disks</h2>
        <div class="table-wrap">
          <table id="disks">
            <thead><tr><th>Device</th><th>Mount</th><th>Filesystem</th><th>Total</th><th>Used</th><th>Available</th><th>Usage</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
      <section>
        <h2>Temperature alerts</h2>
        <div class="table-wrap">
          <table id="alerts">
            <thead><tr><th>GPU</th><th>Triggered</th><th>Status</th><th>Current</th><th>Maximum</th><th>Users</th><th>Email</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
